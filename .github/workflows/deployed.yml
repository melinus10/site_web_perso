name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:      
    name: project set up  
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Deploy and build to Netlify
        run: npx netlify deploy --build --prod
        env:
             NETLIFY_AUTH_TOKEN: ${{ secrets.TOKEN_NETLIFY }}
             NETLIFY_SITE_ID: ${{ secrets.PROJECT_ID }}        